<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
          apiKey: "AIzaSyDtCf6AWHuie2Zc0yHScHsPlqELvvuF-fg",
          authDomain: "expense-tracker-ea4ce.firebaseapp.com",
          projectId: "expense-tracker-ea4ce",
          storageBucket: "expense-tracker-ea4ce.firebasestorage.app",
          messagingSenderId: "77006812808",
          appId: "1:77006812808:web:64915913638c65b81b513d",
          measurementId: "G-XP9W84YF9K"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "my-expense-app"; 

        function App() {
            const [user, setUser] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('expense');
            const [category, setCategory] = useState('Food');
            const [authError, setAuthError] = useState(''); 
            useEffect(() => {
                const loginUser = async () => {
                    try {
                        await signInAnonymously(auth);
                        setAuthError(''); 
                    } catch (error) {
                        setAuthError("Firebase Error: " + error.message);
                    }
                };
                
                loginUser();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);
            useEffect(() => {
                if (!user) return; 

                const dbPath = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
                
                const unsubscribe = onSnapshot(dbPath, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setTransactions(data);
                }, (error) => {
                    console.error("Database error:", error);
                });

                return () => unsubscribe();
            }, [user]);

            const handleAdd = async (e) => {
                e.preventDefault(); 
                
                const newTransaction = {
                    description: description,
                    amount: parseFloat(amount),
                    type: type,
                    category: category,
                    timestamp: Date.now()
                };

                if (user) {
                    try {
                        const dbPath = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
                        await addDoc(dbPath, newTransaction);
                    } catch (err) {
                        console.error("Save error:", err);
                        alert("Could not save to Firebase. Check console for details.");
                    }
                } else {
                    newTransaction.id = Date.now().toString();
                    setTransactions(prev => [newTransaction, ...prev]);
                }
                setDescription('');
                setAmount('');
            };
            const handleDelete = async (transactionId) => {
                if (user) {
                    const itemPath = doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', transactionId);
                    await deleteDoc(itemPath);
                } else {
                    setTransactions(prev => prev.filter(item => item.id !== transactionId));
                }
            };

            let totalIncome = 0;
            let totalExpense = 0;

            transactions.forEach((item) => {
                if (item.type === 'income') {
                    totalIncome += item.amount;
                } else if (item.type === 'expense') {
                    totalExpense += item.amount;
                }
            });

            let currentBalance = totalIncome - totalExpense;

            return (
                <div className="max-w-4xl mx-auto p-6 font-sans">
                    
                    <header className="mb-8">
                        <h1 className="text-3xl font-bold text-slate-800 flex items-center">
                            <i className="fas fa-wallet text-blue-600 mr-3"></i> Student Expense Tracker
                        </h1>
                    </header>
                    
                    {authError && (
                        <div className="bg-amber-100 border-l-4 border-amber-500 text-amber-700 p-4 mb-6 rounded shadow-sm flex items-center justify-between">
                            <div>
                                <p className="font-bold">Database Offline - Local Mode Active</p>
                                <p className="text-sm mt-1">You can still use the app! Your changes will be saved to this screen temporarily. ({authError})</p>
                            </div>
                            <i className="fas fa-wifi text-amber-500 text-xl opacity-50"></i>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-gray-500 text-sm">Current Balance</h3>
                            <p className="text-3xl font-bold text-slate-800">${currentBalance.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-gray-500 text-sm">Total Income</h3>
                            <p className="text-2xl font-bold text-green-600">${totalIncome.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-gray-500 text-sm">Total Expenses</h3>
                            <p className="text-2xl font-bold text-red-600">${totalExpense.toFixed(2)}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        
                        <div className="md:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                            <h2 className="text-xl font-bold mb-4">Add New</h2>
                            <form onSubmit={handleAdd} className="flex flex-col gap-4">
                                
                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">Type</label>
                                    <select value={type} onChange={(e) => setType(e.target.value)} className="w-full p-2 border rounded bg-gray-50 outline-none focus:border-blue-500">
                                        <option value="expense">Expense</option>
                                        <option value="income">Income</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">Description</label>
                                    <input type="text" required value={description} onChange={(e) => setDescription(e.target.value)} placeholder="e.g. Textbooks" className="w-full p-2 border rounded bg-gray-50 outline-none focus:border-blue-500" />
                                </div>

                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">Amount ($)</label>
                                    <input type="number" required min="0" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full p-2 border rounded bg-gray-50 outline-none focus:border-blue-500" />
                                </div>

                                <div>
                                    <label className="block text-sm text-gray-600 mb-1">Category</label>
                                    <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full p-2 border rounded bg-gray-50 outline-none focus:border-blue-500">
                                        <option value="Food">Food</option>
                                        <option value="Transport">Transport</option>
                                        <option value="School">School/Education</option>
                                        <option value="Entertainment">Entertainment</option>
                                        <option value="Salary">Salary/Job</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                {}
                                <button type="submit" className="text-white font-bold py-2 rounded mt-2 transition-colors bg-blue-600 hover:bg-blue-700">
                                    <i className="fas fa-plus mr-2"></i> Add Item
                                </button>
                            </form>
                        </div>

                        <div className="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h2 className="text-xl font-bold mb-4">History</h2>
                            
                            {transactions.length === 0 ? (
                                <p className="text-gray-400 text-center py-10">No transactions added yet.</p>
                            ) : (
                                <div className="flex flex-col gap-3">
                                    {transactions.map((item) => (
                                        <div key={item.id} className="flex justify-between items-center p-4 border rounded hover:bg-gray-50">
                                            
                                            <div className="flex items-center gap-4">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${item.type === 'income' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                                    <i className={`fas ${item.type === 'income' ? 'fa-arrow-up' : 'fa-arrow-down'}`}></i>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-gray-800">{item.description}</p>
                                                    <p className="text-xs text-gray-500">{item.category}</p>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-4">
                                                <p className={`font-bold ${item.type === 'income' ? 'text-green-600' : 'text-gray-800'}`}>
                                                    {item.type === 'income' ? '+' : '-'}${item.amount.toFixed(2)}
                                                </p>
                                                <button onClick={() => handleDelete(item.id)} className="text-gray-400 hover:text-red-600 transition-colors">
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>

                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
